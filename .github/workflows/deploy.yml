name: Deploy to GitHub Pages

# Baut die App und veröffentlicht den fertigen dist/-Ordner in den Branch
# "gh-pages". Danach in den Repo-Einstellungen unter Settings → Pages die
# Quelle auf "Deploy from a branch" → Branch "gh-pages" / "/ (root)" stellen.
#
# Dieser Weg funktioniert aus jedem Branch heraus (keine Einschränkung auf den
# Default-Branch) und kommt ohne zusätzliche Actions von Drittanbietern aus.

on:
  push:
    branches:
      - main
      - claude/listly-vite-pwa-app-kiqlr6
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # .nojekyll verhindert die Jekyll-Verarbeitung durch GitHub Pages.
      - run: touch dist/.nojekyll
      - name: Publish to gh-pages branch
        run: |
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
